id: https://w3id.org/fga-wg/schema/experiment
name: experiment
imports:
  - linkml:types

classes:
  Experiment:
    description: Represents a sequencing experiment that has been carried out within a study, based on biological samples, and providing data files as output. Subsequent analysis of output data is described by the Analysis entity.
    slots:
      - experiment_external_id
      - experiment_id
      - label
      - study_ref
      - samples
      - molecule_type
      - assay_type
      - design_description
      - library_layout
      - instrument
      - sequencing_protocol
      - antibody_target
      - biological_processes

slots:
  experiment_external_id:
    description: External, globally unique identifier for the experiment.
    range: CURIE
  experiment_id:
    description: Internal identifier for the experiment (unique within the metadata deposition).
    required: true
    identifier: true
    range: CURIE
  label:
    description: A human-readable description of the experiment, short enough to be used for listings within software user interfaces, tables, illustration legends, etc.
    required: true
    pattern: "^.{0,60}$"
  study_ref:
    description: Internal reference to the study within which the experiment has been carried out.
    required: true
    range: CURIE
  samples:
    description: External or internal references to samples used in the experiment. Internal references should refer to Sample objects.
    required: true
    range: InputSource
    multivalued: true
  molecule_type:
    description: Specifies the type of source material that is being sequenced.
    required: true
    range: Term
  assay_type:
    description: Sequencing technique intended for this library.
    required: true
    range: Term
  design_description:
    description: The high-level experiment design including layout, protocol.
    range: string
  library_layout:
    description: Whether the library was built as paired-end, or single-end.
    range: Term
  instrument:
    description: Technology platform used to perform nucleic acid sequencing, including name and/or number associated with a specific sequencing instrument model. It is recommended to be as specific as possible for this property (e.g. if the model/revision are available, providing that instead of just the instrument maker).
    range: Term
  sequencing_protocol:
    description: Set of rules which guides how the sequencing protocol was followed. Change-tracking services such as Protocol.io or GitHub are encouraged instead of dumping free text in this field.
    range: string
  antibody_target:
    description: The target of the antibody used in the experiment.
    required_if: ???
    range: Term
  biological_processes:
    description: Biological processes illuminated by the experiment.
    range: Term
    multivalued: true