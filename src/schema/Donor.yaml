id: https://w3id.org/fga-wg/schema/donor
name: donor
imports:
  - linkml:types
  
classes:
  Donor:
    description: Information about the donor or complete organism from which the sample was taken.
    slots:
      - donor_external_id
      - donor_id
      - species_taxon
      - sex

slots:
  donor_external_id:
    description: External, globally unique identifier for the donor/organism.
    range: CURIE
  donor_id:
    description: Internal identifier for the donor/organism (unique within the metadata deposition). 
    required: true
    identifier: true
    range: CURIE
  species_taxon:
    description: Taxonomical classification of the species of the donor/organism.
    required: true
    range: Term
  sex:
    description: Biological sex of the donor/organism.
    range: Term