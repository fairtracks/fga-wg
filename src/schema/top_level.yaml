id: https://w3id.org/fga-wg/schema/top_level
name: top-level

prefixes:
  linkml: https://w3id.org/linkml/

imports:
  - linkml:types
  - analysis
  - deposit
  - donor
  - experiment
  - file
  - file_collection
  - sample


classes:
  TopLevel:
    description: 'A dataset of harmonised metadata for a set genome annotation (and other relevant) files. Metadata has been harmonised in line with the "FAIRification of Genomic Annotations" data model. This is the top-level class to be used as root for the metadata document.'
    slots:
      - deposit
      - file_collections
      - files
      - experiments
      - analyses
      - samples
      - donors

slots: 
  deposit:
    description: 'Information about a publicly deposited dataset of harmonised metadata of genome annotation (and other relevant) files.'
    required: true
    range: Deposit
    inlined: true
  file_collections:
    description: 'Information about collections of files contained in this dataset, each collection defined according to some selection criteria.'
    range: FileCollection
    multivalued: true
    inlined: true
    inlined_as_list: true
  files:
    description: 'Information about particular genome annotation (and other relevant) files.'
    range: File
    multivalued: true
    inlined: true
    inlined_as_list: true
  donors:
    description: 'Information about the donors or complete organisms from which the samples were taken.'
    range: Donor
    multivalued: true
    inlined: true
    inlined_as_list: true
  samples:
    description: 'Information about the biospecimens/samples used as raw material for lab experiments.'
    range: Sample
    multivalued: true
    inlined: true
    inlined_as_list: true
  experiments:
    description: 'Information about sequencing experiments that have been carried out to generate the files.'
    range: Experiment
    multivalued: true
    inlined: true
    inlined_as_list: true
  analyses:
    description: 'Information about computational processing and analyses that have been carried out to generate the files.'
    range: Analysis
    multivalued: true
    inlined: true
    inlined_as_list: true

