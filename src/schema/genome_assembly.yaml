id: https://w3id.org/fga-wg/schema/genome-assembly
name: genome_assembly

prefixes:
  linkml: https://w3id.org/linkml/
  ga4gh_refget_info: https://ga4gh.github.io/refget/

imports:
  - linkml:types
  
classes:
  GenomeAssembly:
    description: 'Information about of the exact genome assembly used to generate the annotation file, defining the genomic coordinate system for the sequence features.'
    conforms_to: "GA4GH Refget Sequence Collections v1.0"
    source: ga4gh_refget_info:schemas/seqcol_extended_v1.0.0.json
    see_also:
      - ga4gh_refget_info:seqcols
    slots:
      - seqcol_digest
      - seqcol_ordered_coord_system
      - seqcol_unordered_coord_system
      - accessions
      - aliases

slots:
  seqcol_digest:
    description: 'Top-level sequence collection digest according to the GA4GH refget, Sequence Collections standard (v1.0). This a globally unique identifier for the genome assembly, algorithmically derivable from the genome assembly content. Usage is to uniquely identify the exact genome assembly used and allow detailed comparisons across genome assembly variants (say, variants of the GRCh38 assembly).'
    required: true
    identifier: true
    range: curie
    examples:
      - value: 'ga4gh:SC.EiFob05aCWgVU_B_Ae0cypnQut3cxUP1'
  seqcol_ordered_coord_system:
    description: 'Content-derived digest that uniquely identifies the ordered coordinate system of the genome assembly. (Coordinate systems with the same sequence names and lengths, but where the sequences are ordered differently, will have different ordered digests.). Usage is the ordered coordinate system digest can be used to uniquely generate a chromSizes file, useful in a number of analysis tools. Definition is the ordered coordinate system digest is defined as the level 1 digest of the name_length_pairs attribute of the sequence collection generated from the genome assembly.'
    required: true
    range: curie
    examples:
      - value: 'ga4gh:SC.name_length_pairs.Yyz0Expaluj09xdDYg2Y6VOApvjg05Hf'
  seqcol_unordered_coord_system:
    description: 'Content-derived digest that uniquely identifies the order-invariant coordinate system of the genome assembly. This digest will be shared across all coordinate systems with the same sequence names and lenghts, regardless of the order of the sequences. Usage is the order-invariant coordinate system digest can be used to uniquely describe the coordinate system of a particular genome browser instance and the annotation files that are compatible with it. Definition is the order-invariant coordinate system digest is defined as the level 1 digest of the sorted_name_length_pairs attribute of the sequence collection generated from the genome assembly.'
    required: true
    range: curie
    examples:
      - value: 'ga4gh:SC.sorted_name_length_pairs._dMQ5dPUNVx4OGQnDAPmGMkVRWWcYV99'
  accessions:
    description: 'Database accession numbers for the genome assembly, if available. Should precisely identify the genome assembly and be omitted if changes have been made to the assembly after retrieval, such as removing the alternate sequences.'
    range: string
    multivalued: true
    examples:
      - value: 'encode:ENCSR425FOI'
  aliases:
    description: 'Human-readable aliases of the genome assembly. Can be imprecise, as preciseness is enforced in the other fields.'
    required: true
    range: curie
    multivalued: true
    examples:
      - value: 'GRCh38_no_alt_analysis_set_GCA_000001405.15'
      - value: 'GRCh38'
      - value: 'hg38'
