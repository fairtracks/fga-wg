slots:
  file_external_id:
    description: 'External, globally unique identifier for the data file.'
    range: curie
    examples:
      - value: 'encode:ENCFF323LCS'
  file_id:
    description: 'Internal identifier for the data file (unique within the metadata deposit). '
    required: true
    identifier: true
    range: curie
    examples:
      - value: 'file:ENCFF323LCS'
  name:
    description: 'A string that can be used to name a data file. This string is made up of uppercase and lowercase letters, decimal digits, hypen, period, and underscore [A-Za-z0-9.-_]. See http://pubs.opengroup.org/onlinepubs/9699919799/basedefs/V1_chap03.html#tag_03_282 [portable filenames].'
    range: string
    examples:
      - value: '87234.ENCODE.ENCBS004ENC.H3K9me3.peak_calls.bigBed'
  label:
    description: 'A human-readable description of the data file, short enough to be used for listings within software user interfaces, tables, illustration legends, etc.'
    required: true
    range: string
    pattern: "^.{1,60}$"
    examples:
      - value: 'H3K9me3 ChIP-seq replicated peaks, GRCh38, AG04450'
  filecollection_refs:
    description: 'Internal references to the FileCollection objects (within the deposit) that contains the data file, if any.'
    required: true
    range: curie
    multivalued: true
    examples:
      - value: 'collection:ihec_encode'
  input_sources:
    description: 'External or internal references to data sources for the file, typically a data collection or a process that has generated the file. Internal references should lead to FileCollection, File, Experiment, or Analysis objects.'
    required: true
    range: InputSource
    multivalued: true
    examples:
      - object:
          inputsource_ref: 'analysis:ENCAN718KHT'
          qualified_relation: 'prov:wasGeneratedBy'
          biological_replicate_labels: [ "1", "2" ]
          technical_replicate_labels: [ "1_1", "2_1" ]
  description:
    description: 'A human readable description of the data file.'
    range: string
    examples:
      - value: 'H3K9me3 ChIP-seq replicated peaks on human (hg38) AG04450 (Fibroblast derived cell line).'
  self_uri:
    description: 'A drs:// hostname-based URI, as defined in the DRS documentation, that tells clients how to access this object. The intent of this field is to make DRS objects self-contained, and therefore easier for clients to store and pass around. For example, if you arrive at this DRS JSON by resolving a compact identifier-based DRS URI, the self_uri presents you with a hostname and properly encoded DRS ID for use in subsequent access endpoint calls.'
    range: uri
    examples:
      - value: 'drs://drs.example.org/ENCFF323LCS'
  access_methods: 
    description: 'The list of access methods that can be used to fetch the data file. '
    required: true
    range: AccessMethod
    multivalued: true
    examples:
      - object:
          type: https
          access_url:
            url: 'https://epigenomesportal.ca/tracks/ENCODE/hg38/87234.ENCODE.ENCBS004ENC.H3K9me3.peak_calls.bigBed'
      - object:
          type: https
          access_url:
            url: 'https://www.encodeproject.org/files/ENCFF323LCS/@@download/ENCFF323LCS.bigBed'
      - object:
          type: s3
          access_url:
            url: 's3://encode-public/2016/11/13/efd4e74e-7875-4d13-9630-0085bc834f18/ENCFF323LCS.bigBed'
      - object:
          type: https
          access_url:
            url: 'https://encode-public.s3.amazonaws.com/2016/11/13/efd4e74e-7875-4d13-9630-0085bc834f18/ENCFF323LCS.bigBed'
      - object:
          type: https
          access_url:
            url: 'https://datasetencode.blob.core.windows.net/dataset/2016/11/13/efd4e74e-7875-4d13-9630-0085bc834f18/ENCFF323LCS.bigBed?sv=2019-10-10&si=prod&sr=c&sig=9qSQZo4ggrCNpybBExU8SypuUZV33igI11xw0P7rB3c%3D'

  run_provenance:
    description: 'Document detailing the provenance of the experiment or analysis run which produced the file as one of its outputs. The provenance info should include software versions, parameter settings, etc.'
    range: uriorcurie
    examples:
      - value: 'encode:ENCAN718KHT'
  quality_assessments:
    description: 'An array of QualityAssessment objects containing the main quality scores from assessment techniques applied to the data file.'
    range: QualityAssessment
    multivalued: true
    examples:
      - object:
          assessment_method: 'histone-chipseq-quality-metrics'
          assessment_values:
            nreads: 21018235
            nreads_in_peaks: 6161851
            frip: 0.2931669095906483
          assessment_details_url: 'https://www.encodeproject.org/histone-chipseq-quality-metrics/70ae08dc-3edc-437f-a0a5-378c72e6269b/'
  file_type:
    description: 'The file format of the data file.'
    required: true
    range: Term
    examples:
      - object:
          id: 'edam:format_3004'
          label: 'bigBed'
  mime_type:
    description: 'A string providing the mime-type of the data file.'
    range: string
    examples:
      - value: 'application/octet-stream'
  data_content:
    description: "Classification describing the file's purpose or contents."
    required: true
    range: OutputType
    examples:
      - value: 'replicated peaks'
  size:
    description: 'For blobs, the blob size in bytes. '
    required: true
    range: integer
    examples:
      - object: 5359719
  created_time:
    description: 'Timestamp of content creation in RFC3339. (This is the creation time of the underlying content, not of the JSON object.).'
    required: true
    range: datetime
    examples:
      - value: '2016-11-13T17:42:04.385801+00:00'
  updated_time:
    description: 'Timestamp of content update in RFC3339, identical to created_time in systems that do not support updates. (This is the update time of the underlying content, not of the JSON object.).'
    range: datetime
    examples:
      - value: '2016-11-13T17:42:04.385801+00:00'
  version:
    description: 'A string representing a version. (Some systems may use checksum, a RFC3339 timestamp, or an incrementing version number.).'
    range: string
    examples:
      - value: 'efd4e74e-7875-4d13-9630-0085bc834f18'
  checksums:
    description: 'A list of checksums of the data file. At least one checksum must be provided. For blobs, the checksum is computed over the bytes in the blob.'
    required: true
    range: Checksum
    multivalued: true
    examples:
      - object:
          checksum: '535bc9628a1c5e5215226f9996e4eaca'
          type: md5
