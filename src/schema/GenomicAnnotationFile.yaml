id: https://w3id.org/fga-wg/schema/genomic-annotation-file
name: GenomicAnnotationFile

prefixes:
  linkml: https://w3id.org/linkml/

imports:
  - linkml:types
  - File
  - GenomeAssembly
  - Term
  - TrackGeometry

classes:
  GenomicAnnotationFile:
    is_a: File
    description: 'Information about a genomic annotation / track file. GenomicAnnotationFile is a specification of the File entity and inherits all the fields defined in File, in addition to the fields that are specific to GenomicAnnotationFile, as detailed here.'
    slots:
      - genomic_annotation_digest
      - genome_assembly
      - track_geometry
      - sequence_features

slots:
  genomic_annotation_digest:
    description: 'Content-derived digest for distributed identification of genomic annotation files. (This field is currently a placeholder, as an algorithm for generating such a digest is yet to be specified.).'
    range: curie
  genome_assembly:
    description: 'Information about the genome assembly used to generate the genomic annotation file, consequently defining the genomic coordinate system for the annotation.'
    required: true
    range: GenomeAssembly
    examples:
      - value: 'ga4gh:SC.EiFob05aCWgVU_B_Ae0cypnQut3cxUP1'
  track_geometry:
    description: 'Geometric properties of the sequence features in the genomic annotation file if considered as an one-dimensional genome browser track (also relevant for non-visual analyses).'
    required: true
    range: TrackGeometry
    examples:
      - object:
          elements_circular: false
          elements_overlapping: false
          has_edges: false
          has_gaps: true
          has_lengths: true
          has_names: true
          has_strands: false
          has_values: true
          lengths_constant: false
          value_type: multiple
  sequence_features:
    description: 'List of sequence features described by the genomic annotation file.'
    required: true
    range: Term
    multivalued: true
    examples:
      - object:
          id: SO:0001707
          label: H3K9Me3
