id: https://w3id.org/fga-wg/schema/bundle
name: Bundle

prefixes:
  linkml: https://w3id.org/linkml/

imports:
  - linkml:types
  - BundleMetadata
  - Analysis
  - Donor
  - Experiment
  - File
  - FileCollection
  - GenomicAnnotationFile
  - Sample
  - Study


classes:
  Bundle:
    description: 'A bundle representing a set of genome annotation files, organised in sub-collections. Metadata has been harmonised in line with the "FAIRification of Genomic Annotations" data model.'
    slots:
      - bundle_metadata
      - donors
      - experiments
      - files
      - file_collections
      - analyses
      - samples
      - studies

slots: 
  bundle_metadata:
    description: 'Top-level metadata about the bundle of genomic annotation files.'
    required: true
    range: BundleMetadata
    inlined: true
  file_collections:
    description: 'Information about collections of files contained in this dataset, each collection defined according to some selection criteria.'
    range: FileCollection
    multivalued: true
    inlined: true
    inlined_as_list: true
  files:
    description: 'Information about particular genome annotation (and other relevant) files.'
    range: File
    multivalued: true
    inlined: true
    inlined_as_list: true
  studies:
    description: 'The scientific studies, i.e. units of research, within which experiments and/or analyses have been carried out.'
    range: Study
    multivalued: true
    inlined: true
    inlined_as_list: true
  donors:
    description: 'Information about the donors or complete organisms from which the samples were taken.'
    range: Donor
    multivalued: true
    inlined: true
    inlined_as_list: true
  samples:
    description: 'Information about the biospecimens/samples used as raw material for lab experiments.'
    range: Sample
    multivalued: true
    inlined: true
    inlined_as_list: true
  experiments:
    description: 'Information about sequencing experiments that have been carried out to generate the files.'
    range: Experiment
    multivalued: true
    inlined: true
    inlined_as_list: true
  analyses:
    description: 'Information about computational processing and analyses that have been carried out to generate the files.'
    range: Analysis
    multivalued: true
    inlined: true
    inlined_as_list: true

