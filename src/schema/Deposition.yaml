id: https://w3id.org/fga-wg/schema/deposition
name: deposition
imports:
  - linkml:types

classes:
  Deposition:
    description: Top-level information about an entire metadata deposition following the "FAIRification of Genomic Annotations" data model. 
    slots:
      - deposition_id
      - deposition_versioned_id
      - label
      - description
      - first_created
      - last_changed
      - input_sources
      - ontology_versions

slots:
  deposition_id:
    description: A globally unique and persistent identifier for the metadata deposition, permanently depositioned in a repository. A DOI or other persistent identifier is recommended.
    range: CURIE
  deposition_versioned_id:
    description: A globally unique, persistent and versioned identifier for the metadata deposition. A versioned DOI to a depositioned document is recommended.
    identifier: true
    required: true
    range: CURIE
  label:
    description: A human-readable description of the metadata deposition, short enough to be used for listings within software user interfaces, tables, illustration legends, etc.
    required: true
    pattern: "^.{0,60}$"
  description:
    description: Human-readable description of the metadata deposition.
    range: string
  first_created:
    description: The date and time of the creation of the first version of the metadata deposition.
    required: true
    range: datetime
  last_changed:
    description: The date and time of the last change of the current metadata deposition (corresponding to "deposition_versioned_id").
    required: true
    range: datetime
  input_sources:
    description: References to other input sources from which this entire metadata deposition was derived, or possibly including DOIs of other metadata depositions used as source.
    range: InputSource
    multivalued: true
  ontology_versions:
    description: Map from the version-agnostic URL to a versioned URL (e.g. "versionIRI" in owl") of each ontology used in the current metadata deposition (corresponding to "deposition_versioned_id").
    required: true
    range: object