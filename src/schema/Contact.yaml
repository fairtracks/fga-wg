id: https://w3id.org/fga-wg/schema/contact
name: Contact

prefixes:
  linkml: https://w3id.org/linkml/

imports:
  - linkml:types

classes:
  Contact:
    description: 'Contact information for a person or an organisation.'
    slots:
      - name
      - contact_id
      - email

slots:
  name: 
    description: 'Name of the person or organisation.'
    required: true
    range: string
    examples:
      - value: 'John Doe'
  contact_id:
    description: 'Globally unique identifier for a person (e.g. ORCID ID) or organisation (e.g. BioProject accession).'
    range: curie
    examples:
      - value: 'orcid:0000-0001-2345-6789'
  email:
    description: 'E-mail address of the person or organisation.'
    range: string
    pattern: "^\\S+@\\S+\\.\\S+$"
    examples:
      - value: 'john@doe.com'
