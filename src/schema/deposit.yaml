id: https://w3id.org/fga-wg/schema/deposit
name: deposit
imports:
  - linkml:types
  - input_source
  - util

classes:
  Deposit:
    description: 'Top-level information about an entire metadata deposit following the "FAIRification of Genomic Annotations" data model. '
    slots:
      - deposit_id
      - deposit_versioned_id
      - label
      - description
      - first_created
      - last_changed
      - input_sources
      - ontology_versions

  OntologyVersions:
    description: 'Information about an ontology used in the metadata deposit.'
    slots:
      - namespace
      - ontology_url
      - versioned_ontology_url

slots:
  deposit_id:
    description: 'A globally unique and persistent identifier for the metadata deposit, permanently deposited in a repository. A DOI or other persistent identifier is recommended.'
    range: curie
    examples:
      - value: 'doi:10.1234/zenodo.12345678'
  deposit_versioned_id:
    description: 'A globally unique, persistent and versioned identifier for the metadata deposit. A versioned DOI to a deposited document is recommended.'
    identifier: true
    required: true
    range: curie
    examples:
      - value: 'doi:10.1234/zenodo.12345679'
  label:
    description: 'A human-readable description of the metadata deposit, short enough to be used for listings within software user interfaces, tables, illustration legends, etc.'
    required: true
    range: string
    pattern: "^.{1,60}$"
    examples:
      - value: 'IHEC data portal metadata, harmonised to the FGA-WG model.'
  description:
    description: 'Human-readable description of the metadata deposit.'
    range: Any
    any_of:
      - range: string
      - range: uri
    examples:
      - value: 'The metadata contents of the International Human Epigenome Consortium (IHEC) data portal, harmonised to follow the metadata model developed by the "FAIRification of Genomic Annotations WG" in the Research Data Alliance (RDA), enhanced with metadata from original sources.'
  first_created:
    description: 'The date and time of the creation of the first version of the metadata deposit.'
    required: true
    range: datetime
    examples:
      - value: '2025-07-01T12:36:00Z'
  last_changed:
    description: 'The date and time of the last change of the current metadata deposit (corresponding to "deposit_versioned_id").'
    required: true
    range: datetime
    examples:
      - value: '2025-07-01T12:36:00Z'
  input_sources:
    description: 'References to other input sources from which this entire metadata deposit was derived, or possibly including DOIs of other metadata deposits used as source.'
    range: InputSource
    multivalued: true
    examples:
      - object:
          inputsource_external_ref: 'https://epigenomesportal.ca/ihec/'
          qualified_relation: 'prov:wasDerivedFrom'
  ontology_versions:
    description: 'Map from the version-agnostic URL to a versioned URL (e.g. "versionIRI" in owl) of each ontology used in the current metadata deposit (corresponding to deposit_versioned_id").'
    required: true
    range: OntologyVersions
    multivalued: true
    examples:
      - object:
          namespace: 'edam'
          ontology_url: 'http://edamontology.org/EDAM.owl'
          versioned_ontology_url: 'http://edamontology.org/EDAM_1.21.owl'
      - object:
          namespace: 'cl'
          ontology_url: 'http://purl.obolibrary.org/obo/cl.owl'
          versioned_ontology_url: 'http://purl.obolibrary.org/obo/cl/releases/2020-05-21/cl.owl'
      - object:
          namespace: 'efo'
          ontology_url: 'http://www.ebi.ac.uk/efo/efo.owl'
          versioned_ontology_url: 'http://www.ebi.ac.uk/efo/releases/v3.21.0/efo.owl'
      - object:
          namespace: 'ncit'
          ontology_url: 'http://purl.obolibrary.org/obo/ncit.owl'
          versioned_ontology_url: 'http://purl.obolibrary.org/obo/ncit/releases/2020-07-17/ncit.owl'
      - object:
          namespace: 'obi'
          ontology_url: 'http://purl.obolibrary.org/obo/obi.owl'
          versioned_ontology_url: 'http://purl.obolibrary.org/obo/obi/2020-04-23/obi.owl'
      - object:
          namespace: 'so'
          ontology_url: 'http://purl.obolibrary.org/obo/so.owl'
          versioned_ontology_url: 'http://purl.obolibrary.org/obo/so/2020-08-20/so.owl'
      - object:
          namespace: 'uberon'
          ontology_url: 'http://purl.obolibrary.org/obo/uberon.owl'
          versioned_ontology_url: 'http://purl.obolibrary.org/obo/uberon/releases/2020-06-30/uberon.owl'
  namespace:
    description: 'The CURIE namespace (prefix) an ontology (e.g. "GO" for Gene Ontology).'
    required: true
    range: string
    examples:
      - value: edam
  ontology_url:
    description: 'The version-agnostic URL of the ontology (e.g. the IRI of the ontology in OWL).'
    required: true
    range: uri
    examples:
      - value: 'http://edamontology.org/EDAM.owl'
  versioned_ontology_url:
    description: 'The versioned URL of the ontology (e.g. the "versionIRI" in OWL).'
    required: true
    range: uri
    examples:
      - value: 'http://edamontology.org/EDAM_1.21.owl'
