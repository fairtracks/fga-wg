id: https://w3id.org/fga-wg/schema/term
name: term
imports:
  - linkml:types

classes:
  Term:
    description: Helper entity to represent an ontology term as a data value. 
    slots:
      - id
      - label

slots: 
  id: 
    description: External, globally unique identifier for the ontology term (in CURIE form).
    required: true
    range: CURIE
  label:
    description: Human-readable label associated to the term id in the current version of the ontology (as listed in the "ontology_versions" field of the Deposition object).
    range: string