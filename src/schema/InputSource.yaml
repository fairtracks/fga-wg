id: https://w3id.org/fga-wg/schema/inputsource
name: inputsource
imports:
  - linkml:types

classes:
  InputSource:
    description: General object representing the source of data files, samples, or other entities used as input to a process or a result. An input source refering to a single file or sample object will represent that item only, while an input source referring to a container or process may represent a number of disctinct input items. InputSource also contains information about the type of relationship, replication labelling, versioning and retrieval date.
    slots:
      - inputsource_external_ref
      - inputsource_ref
      - database_accessions
      - qualified_relation
      - biological_replicate_labels
      - technical_replicate_labels
      - version
      - date_of_retrieval

slots:
  inputsource_external_ref: 
    description: Reference to an external entity as the input source, using a globally unique identifier or an URL. External references will in most cases refer to a database, data record, data file, website or other data source. One of "inputsource_external_ref" or "inputsource_ref" must be specified.
    range: string
    exactly_one_of: true
  inputsource_ref:
    description: Reference to an internal object as the input source using a local identifier. Entities to be used as an internal input source includes FileCollection, Sample, Experiment, Analysis or File as restricted by the description of the field where the input source is used. One of "inputsource_external_ref" or "inputsource_ref" must be specified.
    range: CURIE
    exactly_one_of: true
  database_accessions:
    description: Accession numbers for database records used as input source. Used in connection with "inputsource_external_ref".
    range: string
    multivalued: true
  qualified_relation: 
    description: A description of the relationship with the input source.
    required: true
    range: Term
  biological_replicate_labels:
    description: Labels denoting the biological replicates within which the relation is defined, if any.
    range: string
    multivalued: true
  technical_replicate_labels:
    description: Labels denoting the technical replicates within which the relation is defined, if any.
    range: string
    multivalued: true
  version:
    description: Version information for the retrieval from the input source.
    range: string
  date_of_retrieval:
    description: Date of retrieval from the input source, typically used to timestamp downloading data from a database or URL.
    range: datetime