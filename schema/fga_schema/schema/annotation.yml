id: https://w3id.org/fga-wg/schema/annotation
name: fga-annotation
description: >-
  Genomic annotation schema for FAIRification of Genomic Annotations (FGA) Working Group Schema for RDA.
  Includes genomic annotation files, genome assemblies, and track geometries.
license: MIT
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fga: https://w3id.org/fga-wg/schema/
  xsd: http://www.w3.org/2001/XMLSchema#
  shex: http://www.w3.org/ns/shex#
  EDAM: http://edamontology.org/
  SO: http://purl.obolibrary.org/obo/SO_
  
default_prefix: fga
default_range: string

imports:
  - linkml:types
  - types
  - enums
  - core

classes:
  GenomicAnnotationFile:
    description: A file containing genomic annotations
    slots:
      - genomic_annotation_digest
      - file
      - genome_assembly
      - track_geometry
      - annotation_data_type
      - sequence_features
    slot_usage:
      file:
        required: true
      genome_assembly:
        required: true
      track_geometry:
        required: true
      annotation_data_type:
        required: true
      sequence_features:
        required: true

  GenomeAssembly:
    description: Information about a reference genome assembly
    slots:
      - refget_seqcol_digest
      - refget_ordered_coordinate_system_digest
      - refget_unordered_coordinate_system_digest
      - accessions
      - aliases
    slot_usage:
      refget_seqcol_digest:
        required: true
      refget_ordered_coordinate_system_digest:
        required: true
      refget_unordered_coordinate_system_digest:
        required: true
      accessions:
        required: true
      aliases:
        required: true

  TrackGeometry:
    description: Geometric properties of a genomic annotation track
    slots:
      - has_gaps
      - has_lenghts
      - has_strands
      - has_values
      - has_edges
      - has_names
      - elements_overlapping
      - elements_circular
      - lengths_constant
      - value_type
      - edges_have_weights
      - edge_weight_type
      - edges_are_directed
      - edges_denote_parents
    slot_usage:
      has_gaps:
        required: true
      has_lenghts:
        required: true
      has_strands:
        required: true
      has_values:
        required: true
      has_edges:
        required: true
      has_names:
        required: true
      elements_overlapping:
        required: true
      elements_circular:
        required: true
      lengths_constant:
        required_if: "has_lenghts = true"
      value_type:
        required_if: "has_values = true"
      edges_have_weights:
        required_if: "has_edges = true"
      edge_weight_type:
        required_if: "has_edges = true"
      edges_are_directed:
        required_if: "has_edges = true"
      edges_denote_parents:
        required_if: "has_edges = true"

slots:
  genomic_annotation_digest:
    description: Content-derived using variant of refget
    range: CURIE
    
  file:
    description: Reference to the file containing the genomic annotation
    range: File
    
  genome_assembly:
    description: Reference to the genome assembly used for the annotation
    range: GenomeAssembly
    
  track_geometry:
    description: Geometric properties of the genomic annotation track
    range: TrackGeometry
    
  annotation_data_type:
    description: The type of data in the annotation
    range: term
    
  sequence_features:
    description: The sequence features represented in the annotation
    range: term
    multivalued: true
    
  refget_seqcol_digest:
    description: Seqcol digest for the reference genome
    range: CURIE
    
  refget_ordered_coordinate_system_digest:
    description: Ordered coordinate system digest for the reference genome
    range: CURIE
    
  refget_unordered_coordinate_system_digest:
    description: Unordered coordinate system digest for the reference genome
    range: CURIE
    
  accessions:
    description: Accession numbers for the genome assembly
    multivalued: true
    
  has_gaps:
    description: Whether the track has gaps
    range: boolean
    
  has_lenghts:
    description: Whether the track elements have lengths
    range: boolean
    
  has_strands:
    description: Whether the track elements have strand information
    range: boolean
    
  has_values:
    description: Whether the track elements have associated values
    range: boolean
    
  has_edges:
    description: Whether the track elements have edges connecting them
    range: boolean
    
  has_names:
    description: Whether the track elements have names
    range: boolean
    
  elements_overlapping:
    description: Whether track elements can overlap
    range: boolean
    
  elements_circular:
    description: Whether track elements can be circular
    range: boolean
    
  lengths_constant:
    description: Whether all track elements have the same length
    range: boolean
    
  value_type:
    description: The data type of track element values
    range: ValueTypeEnum
    
  edges_have_weights:
    description: Whether edges between track elements have weights
    range: boolean
    
  edge_weight_type:
    description: The data type of edge weights
    range: ValueTypeEnum
    
  edges_are_directed:
    description: Whether edges between track elements are directed
    range: boolean
    
  edges_denote_parents:
    description: Whether edges between track elements denote parent-child relationships
    range: boolean
