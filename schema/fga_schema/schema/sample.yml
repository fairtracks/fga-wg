id: https://w3id.org/fga-wg/schema/sample
name: fga-sample
description: >-
  Sample and donor schema for FAIRification of Genomic Annotations (FGA) Working Group Schema for RDA.
  Includes biological samples and donor/organism information.
license: MIT
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fga: https://w3id.org/fga-wg/schema/
  xsd: http://www.w3.org/2001/XMLSchema#
  shex: http://www.w3.org/ns/shex#
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  FMA: http://purl.obolibrary.org/obo/FMA_
  CL: http://purl.obolibrary.org/obo/CL_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  CLO: http://purl.obolibrary.org/obo/CLO_
  EFO: http://www.ebi.ac.uk/efo/
  HPO: http://purl.obolibrary.org/obo/HP_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  
default_prefix: fga
default_range: string

imports:
  - linkml:types
  - types
  - enums

classes:
  Sample:
    description: Information about a biological sample
    slots:
      - sample_global_id
      - sample_id
      - biospecimen_classification
      - organism_tissue
      - primary_cell
      - cell_line
      - other_biospecimen
      - details
      - phenotype
      - donor
    slot_usage:
      sample_global_id:
        required: true
      sample_id:
        required: true
      biospecimen_classification:
        required: true
      organism_tissue:
        required_if: "biospecimen_classification = 'organism_tissue'"
      primary_cell:
        required_if: "biospecimen_classification = 'primary_normal_cells' or biospecimen_classification = 'primary_abnormal_cells'"
      cell_line:
        required_if: "biospecimen_classification = 'cell_line'"

  Donor:
    description: Information about a donor or organism
    slots:
      - species_taxon_id
      - species_taxon_name
      - sex
      - age
      - clinical_information
      - sampling_location
      - sample_collection_date
    slot_usage:
      species_taxon_id:
        required: true
      species_taxon_name:
        required: true

slots:
  sample_global_id:
    description: Global sample identifier, resolvable by identifiers.org
    range: CURIE
    
  sample_id:
    description: Submitter-local identifier for sample
    range: CURIE
    
  biospecimen_classification:
    description: Main type of structural unit for classification of the sample
    range: BiospecimenClassificationEnum
    
  organism_tissue:
    description: Part of organism from which the sample was taken
    range: term
    
  primary_cell:
    description: Cell type of isolated normal cells in the sample
    range: term
    
  cell_line:
    description: Cultured cell line used in the sample
    range: term
    
  other_biospecimen:
    description: Additional biospecimen information
    range: term
    multivalued: true
    
  details:
    description: Additional details about the sample
    
  phenotype:
    description: Main phenotype connected to the sample
    range: term
    
  donor:
    description: Reference to the donor of the sample
    range: Donor
    
  species_taxon_id:
    description: Species identifier, resolvable by identifiers.org
    range: CURIE
    
  species_taxon_name:
    description: Species name according to NCBITaxonomy
    
  sex:
    description: Sex of the donor
    
  age:
    description: Age of the donor
    
  clinical_information:
    description: Clinical information about the donor
    
  sampling_location:
    description: Location where the sample was collected (ISO format)
    
  sample_collection_date:
    description: Date when the sample was collected (ISO-8601 format)
    range: datetime
