id: https://w3id.org/fga-wg/schema/enums
name: fga-enums
description: >-
  Enumeration definitions for FAIRification of Genomic Annotations (FGA) Working Group Schema for RDA.
license: MIT
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  fga: https://w3id.org/fga-wg/schema/
  xsd: http://www.w3.org/2001/XMLSchema#
  
default_prefix: fga
default_range: string

imports:
  - linkml:types

enums:
  DataSourceTypeEnum:
    description: Types of data sources
    permissible_values:
      analysis:
        description: Data source is an analysis
      experiment:
        description: Data source is an experiment
      file:
        description: Data source is a file
      database:
        description: Data source is a database
        
  BiospecimenClassificationEnum:
    description: Classification of biospecimen types
    permissible_values:
      whole_organism:
        description: Whole organism
      organism_tissue:
        description: Organism tissue
      primary_normal_cells:
        description: Primary normal cells
      primary_abnormal_cells:
        description: Primary abnormal cells
      cell_line:
        description: Cell line
      single_cell:
        description: Single cell
      in_vitro_differentiated_cells:
        description: In vitro differentiated cells
      cell_free_sample:
        description: Cell-free sample
      cloning_host:
        description: Cloning host
      organoid:
        description: Organoid
      technical_sample:
        description: Technical sample
        
  AccessMethodTypeEnum:
    description: Types of access methods for files
    permissible_values:
      s3:
        description: Amazon S3 access method
      gs:
        description: Google Storage access method
      ftp:
        description: FTP access method
      gsiftp:
        description: GSIFTP access method
      globus:
        description: Globus access method
      htsget:
        description: htsget access method
      https:
        description: HTTPS access method
      file:
        description: File access method
        
  ValueTypeEnum:
    description: Types of values for data fields
    permissible_values:
      integer:
        description: Integer value
      number:
        description: Numeric value
      boolean:
        description: Boolean value
      string:
        description: String value
      multiple:
        description: Multiple value types
        
  ReplicateTypeEnum:
    description: Types of replicates in experimental design
    permissible_values:
      biological:
        description: Biological replicate
      isogenic:
        description: Isogenic replicate
      anisogenic:
        description: Anisogenic replicate
      technical:
        description: Technical replicate
      sequencing:
        description: Sequencing replicate
      pseudo:
        description: Pseudo replicate
