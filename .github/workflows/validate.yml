name: Validate Schema

# Fast lint check — runs on every push to every branch and every PR.
# Gives contributors immediate feedback before the full build completes.

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint schema with linkml-lint
        run: uv run doit lint

