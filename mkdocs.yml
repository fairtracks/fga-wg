site_name: FGA-WG Schema Documentation
site_description: >
  LinkML schema for the FAIRification of Genomic Annotations Working Group (RDA FGA-WG).
site_url: https://fairtracks.github.io/fga-wg/
repo_url: https://github.com/fairtracks/fga-wg
repo_name: fairtracks/fga-wg

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - literate-nav:
      nav_file: nav.md      # generated by `doit nav`; groups pages by type
  - glightbox
  - kroki:
      # Renders kroki-<type> fenced code blocks via https://kroki.io
      # e.g.  ```kroki-plantuml  for PlantUML diagrams
      server_url: https://kroki.io
      file_types:
        - svg
      enable_mermaid: false   # mermaid is handled by pymdownx.superfences below

markdown_extensions:
  - attr_list
    # Allows HTML attributes like data-search-exclude on elements
  - md_in_html
    # Allows markdown content inside HTML tags with markdown="1" attribute
  - pymdownx.superfences:
      custom_fences:
        # Renders  ```mermaid  blocks (generated by gen-doc and gen-erdiagram)
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.blocks.caption
  - admonition
  - tables
    # Must come after md_in_html to properly render tables in HTML divs
  - toc:
      permalink: true
      title: "On this page:"
